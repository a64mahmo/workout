name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test_workout.db"
          JWT_SECRET_KEY: "ci-test-secret-key"
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend tests ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --no-coverage --passWithNoTests

  # ── Build gate (only on main / prod) ────────────────────────────────────────
  build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/prod'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t workout-app:ci .
